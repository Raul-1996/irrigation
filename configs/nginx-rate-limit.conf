# Nginx rate limiting for basic auth brute-force protection
# Deploy on: poliv-kg.ops-lab.dev (or wherever nginx reverse proxy runs)
#
# Reference: SPEC-RATE-LIMITING.md § 3.1 [P1]
#
# This is a reference config — NOT auto-deployed by the Flask app.
# Copy relevant sections into your nginx server config.

# ===== Add to http {} block =====

# Rate limit zone: 5 requests/minute per IP, 1MB shared memory (~16k IPs)
limit_req_zone $binary_remote_addr zone=auth:1m rate=5r/m;

# ===== Add to server {} or location / block (before proxy_pass) =====

# Apply rate limiting with burst=3 (first 3 pass instantly, then 1 per 12s)
limit_req zone=auth burst=3 nodelay;
limit_req_status 429;

# ===== Optional: custom 429 error page =====
# error_page 429 /429.html;
# location = /429.html {
#     internal;
#     return 429 '{"error": "Too many requests. Try again later."}';
#     add_header Content-Type application/json;
# }

# ===== Testing =====
# After applying, test with:
#   for i in $(seq 1 10); do curl -s -o /dev/null -w "%{http_code}\n" https://poliv-kg.ops-lab.dev/; done
# Expected: first ~4 return 401 (auth required), rest return 429
