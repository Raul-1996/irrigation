{% extends "base.html" %}

{% block title %}Логи{% endblock %}
{% block page_title %}Логи{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/logs.css">
{% endblock %}

{% block content %}
<div class="filter-bar">
    <div class="filter-row">
        <label>
            <span>С:</span>
            <input type="date" id="fromDate">
        </label>
        <label>
            <span>По:</span>
            <input type="date" id="toDate">
        </label>
    </div>
    <div class="filter-row">
        <label>
            <span>Тип события:</span>
            <select id="eventType">
                <option value="">Все</option>
                <!-- Опции будут загружены динамически -->
            </select>
        </label>
    </div>
    <div class="filter-buttons">
        <button onclick="applyFilter()">Фильтровать</button>
        <button class="export-btn" onclick="exportCSV()">Экспорт CSV</button>
    </div>
</div>

<div style="overflow-x: auto;">
    <table class="logs-table">
        <thead>
            <tr>
                <th class="nowrap">Время</th>
                <th>Тип</th>
                <th>Детали</th>
            </tr>
        </thead>
        <tbody id="log-body">
            <tr>
                <td colspan="3" class="loading">Загрузка логов...</td>
            </tr>
        </tbody>
    </table>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let logsData = [];
    let filteredLogs = [];
    
    // Загрузка логов
    async function loadLogs() {
        try {
            logsData = await api.get('/api/logs');
            filteredLogs = [...logsData];
            updateEventTypeOptions();
            applyDebugVisibility();
            renderLogs();
        } catch (error) {
            console.error('Ошибка загрузки логов:', error);
            showNotification('Ошибка загрузки логов', 'error');
            document.getElementById('log-body').innerHTML = `
                <tr>
                    <td colspan="3" class="no-data">Ошибка загрузки данных</td>
                </tr>
            `;
        }
    }
    
    // Обновление опций типов событий
    function updateEventTypeOptions() {
        const eventTypeSelect = document.getElementById('eventType');
        const currentValue = eventTypeSelect.value;
        
        // Получаем уникальные типы событий
        const eventTypes = [...new Set(logsData.map(log => log.type))].sort();
        
        // Сохраняем опцию "Все"
        eventTypeSelect.innerHTML = '<option value="">Все</option>';
        
        // Добавляем найденные типы событий
        eventTypes.forEach(type => {
            const option = document.createElement('option');
            option.value = type;
            option.textContent = type;
            eventTypeSelect.appendChild(option);
        });
        
        // Восстанавливаем выбранное значение
        if (currentValue && eventTypes.includes(currentValue)) {
            eventTypeSelect.value = currentValue;
        }
    }
    
    // Рендер логов
    function renderLogs() {
        const tbody = document.getElementById('log-body');
        
        if (filteredLogs.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="3" class="no-data">Нет данных для отображения</td>
                </tr>
            `;
            return;
        }
        
        tbody.innerHTML = '';
        
        filteredLogs.forEach(log => {
            const tr = document.createElement('tr');
            
            const tdTime = document.createElement('td');
            tdTime.className = 'nowrap';
            tdTime.textContent = log.timestamp || log.time;
            
            const tdType = document.createElement('td');
            const typeSpan = document.createElement('span');
            typeSpan.className = `log-type ${log.type}`;
            typeSpan.textContent = log.type;
            tdType.appendChild(typeSpan);
            
            const tdDetails = document.createElement('td');
            const detailsPre = document.createElement('pre');
            detailsPre.className = 'log-details';
            detailsPre.textContent = log.details;
            tdDetails.appendChild(detailsPre);
            
            tr.appendChild(tdTime);
            tr.appendChild(tdType);
            tr.appendChild(tdDetails);
            tbody.appendChild(tr);
        });
    }

    function isImportant(log) {
        const t = (log.type || '').toString().toLowerCase();
        const d = (log.details || '').toString().toLowerCase();
        return (
            t.includes('error') || t.includes('warn') || t.includes('emergency') ||
            t.includes('backup') || t.includes('restore') || d.includes('error') || d.includes('warn') || d.includes('emergency')
        );
    }

    function applyDebugVisibility() {
        const cb = document.getElementById('debug-toggle');
        if (!cb) return;
        const dbg = !!cb.checked;
        if (!dbg) {
            filteredLogs = filteredLogs.filter(isImportant);
        }
    }
    
    // Применение фильтров
    async function applyFilter() {
        const fromDate = document.getElementById('fromDate').value;
        const toDate = document.getElementById('toDate').value;
        const eventType = document.getElementById('eventType').value;
        
        try {
            const params = new URLSearchParams();
            
            if (fromDate) params.append('from', fromDate);
            if (toDate) params.append('to', toDate);
            if (eventType) params.append('type', eventType);
            
            const response = await fetch(`/api/logs?${params.toString()}`);
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            filteredLogs = await response.json();
            applyDebugVisibility();
            renderLogs();
            
            if (filteredLogs.length === 0) {
                showNotification('По заданным критериям ничего не найдено', 'info');
            }
        } catch (error) {
            console.error('Ошибка фильтрации логов:', error);
            showNotification('Ошибка фильтрации логов', 'error');
        }
    }
    
    // Экспорт CSV с защитой от формульной инъекции
    function exportCSV() {
        if (filteredLogs.length === 0) {
            showNotification('Нет данных для экспорта', 'warning');
            return;
        }
        
        const sanitize = (value) => {
            let s = String(value).replace(/"/g, '""');
            if (/^[=+\-@]/.test(s)) s = "'" + s; // префикс предотвращает выполнение формул
            return s;
        };
        
        const rows = [
            ['time', 'type', 'details'],
            ...filteredLogs.map(log => [
                (log.timestamp || log.time || ''),
                log.type,
                `"${sanitize(log.details)}"`
            ])
        ];
        
        const csv = rows.map(row => row.join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        
        const now = new Date().toISOString().slice(0, 10);
        link.href = url;
        link.download = `logs_${now}.csv`;
        link.style.display = 'none';
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        
        showNotification(`Экспортировано ${filteredLogs.length} записей`, 'success');
    }
    
    // Сброс фильтров
    function resetFilters() {
        document.getElementById('fromDate').value = '';
        document.getElementById('toDate').value = '';
        document.getElementById('eventType').value = '';
        filteredLogs = [...logsData];
        renderLogs();
    }
    
    // Инициализация
    document.addEventListener('DOMContentLoaded', () => {
        loadLogs();
        
        // Автоматическое применение фильтров при изменении
        document.getElementById('fromDate').addEventListener('change', applyFilter);
        document.getElementById('toDate').addEventListener('change', applyFilter);
        document.getElementById('eventType').addEventListener('change', applyFilter);
        
        // Добавляем кнопку сброса фильтров
        const filterButtons = document.querySelector('.filter-buttons');
        const resetBtn = document.createElement('button');
        resetBtn.textContent = 'Сброс';
        resetBtn.style.cssText = `
            padding: 0.6rem 0.8rem;
            background: #6c757d;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background-color 0.2s;
        `;
        resetBtn.addEventListener('click', resetFilters);
        resetBtn.addEventListener('mouseenter', () => {
            resetBtn.style.background = '#5a6268';
        });
        resetBtn.addEventListener('mouseleave', () => {
            resetBtn.style.background = '#6c757d';
        });
        
        // Добавляем переключатель Debug
        const dbgLabel = document.createElement('label');
        dbgLabel.style.marginLeft = 'auto';
        dbgLabel.style.display = 'flex';
        dbgLabel.style.alignItems = 'center';
        dbgLabel.style.gap = '0.4rem';
        const dbgCb = document.createElement('input');
        dbgCb.type = 'checkbox';
        dbgCb.id = 'debug-toggle';
        const dbgSpan = document.createElement('span');
        dbgSpan.textContent = 'Показывать подробные (DEBUG) сообщения';
        dbgSpan.style.color = '#333';
        dbgSpan.title = 'Включает подробный вывод на сервере и в списке ниже. При выключении отображаются только важные предупреждения и ошибки.';
        dbgLabel.appendChild(dbgCb);
        dbgLabel.appendChild(dbgSpan);
        
        filterButtons.appendChild(dbgLabel);
        filterButtons.insertBefore(resetBtn, filterButtons.firstChild);
        
        // Инициализируем состояние переключателя
        fetch('/api/logging/debug').then(r=>r.json()).then(st=>{
            if (st && typeof st.debug !== 'undefined') {
                dbgCb.checked = !!st.debug;
            }
        }).catch(()=>{});
        dbgCb.addEventListener('change', async ()=>{
            try {
                await fetch('/api/logging/debug', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({enabled: dbgCb.checked})});
                setTimeout(()=>applyFilter(), 150);
            } catch(e){}
        });
    });
</script>
{% endblock %}
