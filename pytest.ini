[pytest]
minversion = 7.0
addopts = --tb=short --durations=20 -ra -p no:selenium -p no:pytest_selenium
timeout = 30
timeout_method = signal
markers =
    mqtt_real: requires real MQTT broker on 10.2.5.244
    e2e: end-to-end tests against live controller
    slow: tests that take >5 seconds
    serial: must run serially (not parallel-safe under pytest-xdist)
filterwarnings = ignore::DeprecationWarning
                 ignore::urllib3.exceptions.NotOpenSSLWarning
testpaths = tests
