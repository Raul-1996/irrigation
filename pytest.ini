[pytest]
minversion = 7.0
addopts = --tb=short --durations=20 -ra -p no:selenium -p no:pytest_selenium -m "not e2e and not mqtt_real"
timeout = 30
timeout_method = signal
# XPASS = ошибка: xfail-маркер обязан описывать реально падающий тест,
# иначе регрессия в «известно сломанной» области пройдёт незамеченной.
xfail_strict = true
markers =
    mqtt_real: requires real MQTT broker (opt-in: pytest -m mqtt_real, needs WB_MQTT_HOST)
    e2e: end-to-end tests against live controller (opt-in: pytest -m e2e, needs WB_E2E_URL/WB_E2E_PASSWORD)
    slow: tests that take >5 seconds
    serial: must run serially (not parallel-safe under pytest-xdist)
filterwarnings = ignore::DeprecationWarning
                 ignore::urllib3.exceptions.NotOpenSSLWarning
testpaths = tests
